<!DOCTYPE html>
<html lang="ko" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Haru 로그인">
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Pretendard', 'system-ui', '-apple-system', 'sans-serif'],
                    },
                    colors: {
                        surface: {
                            950: '#09090b',
                            900: '#111114',
                            800: '#18181c',
                            700: '#27272e',
                            600: '#3f3f48',
                        },
                        accent: {
                            DEFAULT: '#3b82f6',
                            light: '#60a5fa',
                            muted: '#2563eb',
                        },
                    },
                },
            },
        }
    </script>
    <title>Haru - 로그인</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
    <style>
        *, *::before, *::after { word-break: keep-all; }
        body {
            background-image:
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(59,130,246,0.08) 0%, transparent 60%),
                radial-gradient(ellipse 40% 30% at 80% 100%, rgba(59,130,246,0.04) 0%, transparent 50%);
        }
        .card {
            background: rgba(24, 24, 28, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.06);
        }
        .input-field {
            background: rgba(9, 9, 11, 0.5);
            border: 1px solid rgba(255,255,255,0.08);
            transition: all 0.2s ease;
        }
        .input-field:focus {
            border-color: rgba(59,130,246,0.4);
            box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
            background: rgba(9, 9, 11, 0.7);
        }
        .input-field::placeholder {
            color: rgba(161, 161, 170, 0.5);
        }
        .btn-login {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            box-shadow: 0 4px 20px rgba(59,130,246,0.25), inset 0 1px 0 rgba(255,255,255,0.1);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .btn-login:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 6px 28px rgba(59,130,246,0.35), inset 0 1px 0 rgba(255,255,255,0.15);
        }
        .btn-login:active:not(:disabled) {
            transform: scale(0.98);
        }
        .btn-login:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .logo-icon {
            background: linear-gradient(135deg, rgba(59,130,246,0.2) 0%, rgba(59,130,246,0.05) 100%);
            border: 1px solid rgba(59,130,246,0.15);
        }
        .error-banner {
            border: 1px solid rgba(239,68,68,0.15);
            background: rgba(239,68,68,0.08);
        }
        .error-banner-warn {
            border: 1px solid rgba(234,179,8,0.15);
            background: rgba(234,179,8,0.08);
        }
        .fade-in {
            animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        .fade-in-delay { animation-delay: 0.1s; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-surface-950 text-gray-200 font-sans min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-[400px]">
    <!-- 헤더 -->
    <header class="text-center mb-8 fade-in">
        <div class="mx-auto w-16 h-16 rounded-2xl logo-icon flex items-center justify-center mb-4">
            <img src="/images/logo.png" alt="Haru 로고" class="w-10 h-10 object-contain">
        </div>
        <h1 class="text-2xl font-bold tracking-tight">
            <span class="text-accent-light">Haru</span>
        </h1>
        <p class="text-sm text-gray-500 mt-1">계정에 로그인하세요</p>
    </header>

    <!-- 로그인 카드 -->
    <div class="card rounded-2xl p-6 fade-in fade-in-delay">

        <!-- 에러: 인증 실패 -->
        <div id="error-credentials" class="error-banner rounded-xl px-4 py-3 mb-5 hidden flex items-center gap-2.5">
            <svg class="w-4 h-4 text-red-400 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 3.75h.008v.008H12v-.008Z"/>
            </svg>
            <span class="text-sm text-red-300">아이디 또는 비밀번호를 확인하세요.</span>
        </div>

        <!-- 에러: 서비스 장애 -->
        <div id="error-service" class="error-banner-warn rounded-xl px-4 py-3 mb-5 hidden flex items-center gap-2.5">
            <svg class="w-4 h-4 text-yellow-400 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z"/>
            </svg>
            <span class="text-sm text-yellow-300">인증 서비스에 연결할 수 없습니다. 잠시 후 다시 시도해주세요.</span>
        </div>

        <form id="loginForm" class="space-y-4">
            <div>
                <label for="username" class="block text-xs text-gray-500 font-medium mb-1.5">아이디</label>
                <input id="username" type="text" name="username" placeholder="아이디를 입력하세요" autofocus
                       class="input-field w-full rounded-xl px-4 py-3 text-sm text-gray-200 focus:outline-none">
            </div>
            <div>
                <label for="password" class="block text-xs text-gray-500 font-medium mb-1.5">비밀번호</label>
                <input id="password" type="password" name="password" placeholder="비밀번호를 입력하세요"
                       class="input-field w-full rounded-xl px-4 py-3 text-sm text-gray-200 focus:outline-none">
            </div>
            <button type="submit" id="submitBtn"
                    class="btn-login text-white w-full py-3.5 rounded-xl text-base font-bold tracking-tight mt-2">
                로그인
            </button>
        </form>
    </div>
</div>

<script>
    const csrfToken = document.querySelector('meta[name="_csrf"]').content;
    const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;

    function hideErrors() {
        document.getElementById('error-credentials').classList.add('hidden');
        document.getElementById('error-service').classList.add('hidden');
    }

    function showError(type) {
        hideErrors();
        if (type === 'service') {
            document.getElementById('error-service').classList.remove('hidden');
        } else {
            document.getElementById('error-credentials').classList.remove('hidden');
        }
    }

    document.getElementById('loginForm').addEventListener('submit', function (e) {
        e.preventDefault();
        hideErrors();

        var submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true;
        submitBtn.textContent = '로그인 중...';

        var body = new URLSearchParams({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value
        });

        fetch('/member/login', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded',
                'X-Requested-With': 'XMLHttpRequest',
                [csrfHeader]: csrfToken
            },
            body: body,
            credentials: 'same-origin'
        }).then(function (res) {
            return res.json();
        }).then(function (data) {
            if (data.error) {
                showError(data.error);
            } else if (data.redirectUrl) {
                window.location.href = data.redirectUrl;
            }
        }).catch(function () {
            showError('service');
        }).finally(function () {
            submitBtn.disabled = false;
            submitBtn.textContent = '로그인';
        });
    });
</script>
</body>
</html>
