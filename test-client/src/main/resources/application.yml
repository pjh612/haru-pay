spring:
  application:
    name: test-client
  datasource:
    url: jdbc:h2:mem:testclient;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  h2:
    console:
      enabled: true
      path: /h2-console
server:
  port: 8080

payments:
  base-url: http://payments:8071
  checkout-url: http://payments:8071
  connect-timeout: 3s
  read-timeout: 10s
  sse:
    reconnect-delay: 2s

merchant:
  client-id: 00000000-0000-0000-0000-000000000001
  client-name: 테스트 클라이언트
  api-key: 00000000-0000-0000-0000-000000000002

logging:
  config: classpath:log4j2-spring.xml

management:
  zipkin:
    tracing:
      export:
        enabled: false
  tracing:
    sampling:
      probability: 1
