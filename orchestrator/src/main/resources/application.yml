spring:
  application:
    name: joy-orchestrator
  datasource:
    url: jdbc:mysql://localhost:3306/haru
    password: password
    username: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    database: mysql
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
  kafka:
    bootstrap-servers: localhost:9092
    client-id: haru-orchestrator
    consumer:
      auto-offset-reset: earliest
      enable-auto-commit: false
      group-id: haru-orchestrator
    listener:
      concurrency: 2
      missing-topics-fatal: true
server:
  port: 8077
kafka:
  topic:
    saga:
      load-money-request:
        inbox:
          events: LoadMoneyRequestEvent.inbox.events
      load-money:
        inbox:
          events: LoadMoneyRequestCreatedEvent.inbox.events
      check-bank-account:
        inbox:
          events: CheckedRegisteredBankAccountEvent.inbox.events
      firm-banking:
        inbox:
          events: RequestFirmBankingFinishedEvent.inbox.events
      load-money-finish:
        inbox:
          events: LoadMoneyFinishedEvent.inbox.events
      payment-confirm-request:
        inbox:
          events: ConfirmPaymentRequestEvent.inbox.events
      payment-confirm-requested:
        inbox:
          events: PaymentConfirmRequestedEvent.inbox.events
      decreased-money:
        inbox:
          events: DecreasedMoneyEvent.inbox.events
      payment-confirmed:
        inbox:
          events: PaymentConfirmedEvent.inbox.events
logging:
  config: classpath:log4j2-spring.xml
management:
  zipkin:
    tracing:
      export:
        enabled: false
  tracing:
    sampling:
      probability: 1
saga:
  recovery:
    enabled: true
    scan-interval: PT1M
    payment-confirm-request-timeout: PT2M
    decrease-money-timeout: PT2M
    confirm-payment-timeout: PT5M
    load-money-timeout: PT5M
    aborting-timeout: PT5M
    max-recovery-attempts: 3
