spring:
  application:
    name: payments
  datasource:
    url: jdbc:mysql://localhost:3306/haru
    password: password
    username: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    database: mysql
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: create
  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:1025}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    from: ${MAIL_FROM:noreply@harupay.com}
    properties:
      mail:
        smtp:
          auth: ${SMTP_AUTH:false}
          starttls:
            enable: ${SMTP_STARTTLS:false}
  kafka:
    client-id: payments
    consumer:
      auto-offset-reset: earliest
      enable-auto-commit: false
      group-id: haru-payments
    bootstrap-servers: localhost:9092
    listener:
      concurrency: 1
      missing-topics-fatal: true
  data:
    redis:
      cluster:
        nodes:
          - localhost:6479
          - localhost:6480
          - localhost:6481
          - localhost:6482
          - localhost:6483
          - localhost:6484
      port: 6379
      password: bitnami
  security:
    oauth2:
      client:
        registration:
          payments-oidc:
            provider: spring
            client-id: payments
            client-secret: secret
            authorization-grant-type: authorization_code
            redirect-uri: "http://payments:8071/login/oauth2/code/{registrationId}"
            scope: openid
            client-name: payments-oidc
        provider:
          spring:
            authorization-uri: http://auth:8072/oauth2/authorize
            token-uri: http://auth:8072/oauth2/token
            jwk-set-uri: http://auth:8072/oauth2/jwks
server:
  port: 8071

client:
  banking:
    url: http://banking:8074
  member:
    url: http://user-api:8070
  money:
    url: http://localhost:8073

kafka:
  topic:
    payment-confirm-request:
      inbox:
        events:
          name: payment-confirm-request.inbox.events
    confirm-payment:
      inbox:
        events:
          name: confirm-payment.inbox.events
logging:
  config: classpath:log4j2-spring.xml
management:
  zipkin:
    tracing:
      export:
        enabled: false
  tracing:
    sampling:
      probability: 1

alert:
  group-id: node-1
  bridge: kafka
  slack:
    webhook:
      url: https://hooks.slack.com/services/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
  topics:
    - PAYMENT_RESULT

developer-portal:
  url: ${DEVELOPER_PORTAL_URL:http://localhost:3001}
