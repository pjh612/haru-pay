spring:
  jpa:
    hibernate:
      ddl-auto: create
  kafka:
    bootstrap-servers: localhost:9092,localhost:9095,localhost:9096
  security:
    oauth2:
      client:
        registration:
          payments-oidc:
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
        provider:
          spring:
            authorization-uri: http://auth:8072/oauth2/authorize
            token-uri: http://auth:8072/oauth2/token
            jwk-set-uri: http://auth:8072/oauth2/jwks
            issuer-uri: http://auth:8072

client:
  banking:
    url: http://localhost:8074
  member:
    url: http://localhost:8070
  money:
    url: http://localhost:8073

logging:
  config: classpath:log4j2-spring.xml
