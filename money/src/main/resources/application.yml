spring:
  application:
    name: money
  datasource:
    hikari:
      maximum-pool-size: 32
      minimum-idle: 32
    url: jdbc:mysql://localhost:3306/haru
    password: password
    username: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    database: mysql
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
  data:
    redis:
      cluster:
        nodes:
          - localhost:6479
          - localhost:6480
          - localhost:6481
          - localhost:6482
          - localhost:6483
          - localhost:6484
      port: 6379
      password: bitnami
  kafka:
    client-id: haru-money
    consumer:
      auto-offset-reset: earliest
      enable-auto-commit: false
      group-id: haru-money
    bootstrap-servers: localhost:9092
    listener:
      concurrency: 1
      missing-topics-fatal: true
kafka:
  topic:
    load-money-request:
      inbox:
        events:
          name: load-money-request.inbox.events
    load-money:
      inbox:
        events:
          name: load-money.inbox.events
    decrease-money:
      inbox:
        events:
          name: decrease-money.inbox.events
client:
  banking:
    url: "http://banking:8074"
server:
  port: 8073
logging:
  config: classpath:log4j2-spring.xml
management:
  zipkin:
    tracing:
      export:
        enabled: false
  tracing:
    sampling:
      probability: 1
