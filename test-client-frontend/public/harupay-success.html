<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HaruPay Success</title>
  </head>
  <body>
    <p>결제 요청이 완료되었습니다. 창을 닫는 중입니다...</p>
    <script>
      const params = new URLSearchParams(window.location.search);
      const payload = {
        source: 'harupay-success',
        requestId: params.get('requestId') || params.get('paymentId') || '',
        orderId: params.get('orderId') || '',
        requestPrice: Number(params.get('requestPrice') || '0'),
        paymentStatus: params.get('paymentStatus') ? Number(params.get('paymentStatus')) : null,
        approvedAt: params.get('approvedAt'),
      };

      if (window.opener) {
        window.opener.postMessage(payload, window.location.origin);
      }

      window.setTimeout(() => window.close(), 300);
    </script>
  </body>
  </html>
